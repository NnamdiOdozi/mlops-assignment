[experiment]
name = "fp8_kv_cache"
description = "BF16 weights, FP8 KV cache quantisation"

[agent]
model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
temperature = 0.0
max_tokens = 512
max_iterations = 3
verify_max_rows = 3
verify_mode = "deterministic"
reuse_client = true

[schema]
sample_rows = 3
sample_max_chars = 6000
cell_max_chars = 80

[vllm]
model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
served_model_name = "Qwen/Qwen3-30B-A3B-Instruct-2507"
host = "0.0.0.0"
port = 8000
dtype = "bfloat16"
quantization = ""
kv_cache_dtype = "fp8"
max_model_len = 8192
gpu_memory_utilization = 0.92
max_num_seqs = 64
max_num_batched_tokens = 8192
enable_prefix_caching = true
seed = 0
